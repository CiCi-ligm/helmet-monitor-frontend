<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能头盔定位导航系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "SF Pro Display", "Microsoft Yahei", sans-serif;
        }
        body {
            background: #ffffff;
            min-height: 100vh;
            padding: 40px;
            color: #1a1a1a;
            line-height: 1.5;
        }
        .map-box {
            background: #ffffff;
            padding: 32px;
            border-radius: 16px;
            border: 1px solid #e5e7eb;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            max-width: 1200px;
            margin: 0 auto;
        }
        .map-box h3 {
            font-size: 18px;
            font-weight: 600;
            color: #4b5563;
            margin-bottom: 20px;
        }
        #mapContainer {
            width: 100%;
            height: 550px;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #e5e7eb;
            margin-bottom: 20px;
        }
        .nav-controls {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }
        .nav-controls input {
            height: 40px;
            padding: 0 16px;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            font-size: 14px;
            flex: 1;
        }
        .btn-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        .btn-group button {
            height: 40px;
            padding: 0 20px;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            color: #4b5563;
            background: #ffffff;
            transition: all 0.2s;
        }
        .btn-group button:hover {
            background: #f9fafb;
            border-color: #2563eb;
            color: #2563eb;
        }
        .btn-group button:active {
            transform: scale(0.98);
        }
        .btn-group button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .location-info {
            margin-top: 10px;
            padding: 12px;
            background: #f9fafb;
            border-radius: 8px;
            font-size: 14px;
            color: #1a1a1a;
            min-height: 60px;
        }
        .success {
            color: #10b981;
            background: #d1fae5 !important;
            border: 1px solid #10b981 !important;
        }
        .error {
            color: #ef4444;
            background: #fee2e2 !important;
            border: 1px solid #ef4444 !important;
        }
        .loading {
            color: #3b82f6;
            background: #dbeafe !important;
            border: 1px solid #3b82f6 !important;
        }
    </style>
    <!-- 高德地图API - 使用您的Key -->

    <script src="https://webapi.amap.com/ui/1.1/main.js"></script>
</head>

        <div class="nav-controls">

        </div>

        <div class="btn-group">
            <button onclick="getCurrentLocation()" id="locBtn">📍 获取当前位置</button>
            <button onclick="startNavigation()" id="navBtn" disabled>🚀 开始导航</button>
            <button onclick="stopNavigation()" id="stopBtn" disabled>⏹️ 停止导航</button>
            <button onclick="clearMap()">🗑️ 清空地图</button>
        </div>

        <div id="mapContainer"></div>

        <div class="location-info" id="locationInfo">
            👋 欢迎使用智能头盔导航系统！点击"获取当前位置"开始
        </div>
    </div>
