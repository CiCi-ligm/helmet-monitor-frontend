<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>智能头盔定位系统</title>
  <!-- 高德地图 JS API -->
  <script type="text/javascript" src="https://webapi.amap.com/maps?v=2.0&key=你的高德Key"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Microsoft Yahei", sans-serif;
    }
    body, html {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    /* 顶部栏 */
    .top-bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 50px;
      background: #fff;
      display: flex;
      align-items: center;
      padding: 0 15px;
      z-index: 999;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    /* 搜索框 */
    .search-box {
      flex: 1;
      height: 36px;
      background: #f5f5f5;
      border-radius: 18px;
      display: flex;
      align-items: center;
      padding: 0 15px;
      margin-right: 10px;
    }
    .search-box input {
      flex: 1;
      border: none;
      outline: none;
      background: transparent;
      font-size: 14px;
    }
    /* 个人中心按钮 */
    .profile-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: #fff;
      border: none;
      font-size: 18px;
      box-shadow: 0 0 6px rgba(0,0,0,0.2);
      cursor: pointer;
    }
    /* 地图容器 */
    #container {
      width: 100%;
      height: 100%;
    }
    /* 实时信息面板 */
    .info-panel {
      position: fixed;
      bottom: 20px;
      left: 20px;
      background: rgba(255,255,255,0.9);
      padding: 10px 15px;
      border-radius: 10px;
      font-size: 12px;
      line-height: 1.5;
      z-index: 999;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
  </style>
</head>

<body>

  <div class="top-bar">
    <div class="search-box">
      <input id="keyword" placeholder="输入目的地">
    </div>
    <button class="profile-btn" onclick="goToProfile()">👤</button>
  </div>

  <div id="container"></div>

  <div class="info-panel">
    实时状态：已连接<br>
    定位：正常<br>
    卫星数：8 颗
  </div>

  <script>
    // 个人中心跳转
    function goToProfile() {
      const isLogin = localStorage.getItem('isLoggedIn');
      if (isLogin) {
        window.location.href = 'profile.html';
      } else {
        window.location.href = 'login.html';
      }
    }

    // 地图初始化
    var map = new AMap.Map('container', {
      zoom: 17,
      center: [116.397428, 39.90923],
      resizeEnable: true
    });

    // 卫星图 + 路网
    AMap.plugin(['AMap.Satellite', 'AMap.Traffic'], function() {
      var satellite = new AMap.Satellite({});
      map.add(satellite);
    });

    // 定位
    map.plugin('AMap.Geolocation', function() {
      var geolocation = new AMap.Geolocation({
        enableHighAccuracy: true,
        timeout: 10000
      });
      geolocation.getCurrentPosition(function(status, result) {
        if (status == 'complete') {
          map.setCenter(result.position);
        }
      });
    });

    // 搜索
    var placeSearch = new AMap.PlaceSearch({
      map: map
    });
    document.getElementById('keyword').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') {
        placeSearch.search(this.value);
      }
    });
  </script>

</body>
</html>
