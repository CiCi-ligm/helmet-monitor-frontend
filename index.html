<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能头盔定位系统（带登录注册）</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "SF Pro Display", "Microsoft Yahei", sans-serif;
        }
        body {
            background: #ffffff;
            min-height: 100vh;
            padding: 40px;
            color: #1a1a1a;
            line-height: 1.5;
        }
        /* 登录/注册样式 */
        .auth-box {
            max-width: 400px;
            margin: 50px auto;
            padding: 32px;
            border-radius: 16px;
            border: 1px solid #e5e7eb;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        }
        .auth-box h3 {
            font-size: 20px;
            font-weight: 600;
            color: #4b5563;
            margin-bottom: 24px;
            text-align: center;
        }
        .auth-tabs {
            display: flex;
            margin-bottom: 24px;
            border-bottom: 1px solid #e5e7eb;
        }
        .auth-tab {
            flex: 1;
            text-align: center;
            padding: 8px 0;
            cursor: pointer;
            font-weight: 500;
            color: #9ca3af;
        }
        .auth-tab.active {
            color: #2563eb;
            border-bottom: 2px solid #2563eb;
        }
        .auth-form {
            display: none;
        }
        .auth-form.active {
            display: block;
        }
        .auth-form input {
            width: 100%;
            height: 44px;
            padding: 0 16px;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 16px;
        }
        .auth-form button {
            width: 100%;
            height: 44px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }
        .auth-form button:hover {
            background: #1d4ed8;
        }
        .logout-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            height: 40px;
            padding: 0 20px;
            background: #ef4444;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
        }
        /* 定位功能样式（保留原有） */
        .map-box {
            background: #ffffff;
            padding: 32px;
            border-radius: 16px;
            border: 1px solid #e5e7eb;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            max-width: 1200px;
            margin: 0 auto;
            display: none; /* 登录后显示 */
        }
        .map-box h3 {
            font-size: 18px;
            font-weight: 600;
            color: #4b5563;
            margin-bottom: 20px;
        }
        #mapContainer {
            width: 100%;
            height: 550px;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #e5e7eb;
            margin-bottom: 20px;
        }
        .btn-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        .btn-group button {
            height: 40px;
            padding: 0 20px;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            color: #4b5563;
            background: #ffffff;
            transition: all 0.2s;
        }
        .btn-group button:hover {
            background: #f9fafb;
            border-color: #2563eb;
            color: #2563eb;
        }
        .btn-group button:active {
            transform: scale(0.98);
        }
        .mock-btn {
            background: #2563eb !important;
            color: white !important;
            border-color: #2563eb !important;
        }
        .mock-btn:hover {
            background: #1d4ed8 !important;
        }
        .location-info {
            margin-top: 10px;
            padding: 12px;
            background: #f9fafb;
            border-radius: 8px;
            font-size: 14px;
            color: #1a1a1a;
            min-height: 60px;
        }
        .success {
            color: #10b981;
            background: #d1fae5 !important;
            border: 1px solid #10b981 !important;
        }
        .error {
            color: #ef4444;
            background: #fee2e2 !important;
            border: 1px solid #ef4444 !important;
        }
        .loading {
            color: #3b82f6;
            background: #dbeafe !important;
            border: 1px solid #3b82f6 !important;
        }
    </style>
    <!-- 高德地图API -->
    <script src="https://webapi.amap.com/maps?v=2.0&key=977b6123358698744cd4f2a96e219145"></script>
    <script src="https://webapi.amap.com/ui/1.1/main.js"></script>
</head>
<body>
    <!-- 登录/注册界面 -->
    <div class="auth-box" id="authBox">
        <h3>智能头盔定位系统</h3>
        <div class="auth-tabs">
            <div class="auth-tab active" onclick="switchTab('login')">登录</div>
            <div class="auth-tab" onclick="switchTab('register')">注册</div>
        </div>
        
        <!-- 登录表单 -->
        <div class="auth-form active" id="loginForm">
            <input type="text" id="loginUsername" placeholder="请输入用户名">
            <input type="password" id="loginPassword" placeholder="请输入密码">
            <button onclick="login()">登录</button>
        </div>
        
        <!-- 注册表单 -->
        <div class="auth-form" id="registerForm">
            <input type="text" id="regUsername" placeholder="请设置用户名">
            <input type="password" id="regPassword" placeholder="请设置密码">
            <input type="password" id="regConfirmPwd" placeholder="请确认密码">
            <button onclick="register()">注册</button>
        </div>
    </div>

    <!-- 退出按钮 -->
    <button class="logout-btn" id="logoutBtn" style="display: none;" onclick="logout()">退出登录</button>

    <!-- 定位功能界面（登录后显示） -->
    <div class="map-box" id="mapBox">
        <h3>🏍️ 智能头盔定位系统</h3>

        <div class="btn-group">
            <button onclick="getCurrentLocation()" id="locBtn">📍 获取当前位置（浏览器）</button>
            <button onclick="mockHardwareGPS()" class="mock-btn">📡 模拟硬件GPS定位</button>
            <button onclick="clearMap()">🗑️ 清空地图</button>
        </div>

        <div id="mapContainer"></div>

        <div class="location-info" id="locationInfo">
            👋 欢迎使用智能头盔定位系统！点击"模拟硬件GPS定位"开始测试
        </div>
    </div>

    <script>
        // 全局变量（定位相关）
        let map = null;
        let marker = null;
        let currentLocation = null;

        // 页面加载初始化
        window.onload = function() {
            // 检查登录状态
            checkLoginStatus();
            // 初始化地图（登录后会重新初始化）
            initMap();
        };

        // ====================== 登录/注册核心逻辑 ======================
        // 切换登录/注册标签
        function switchTab(type) {
            // 切换标签样式
            document.querySelectorAll('.auth-tab').forEach(tab => tab.classList.remove('active'));
            document.querySelector(`.auth-tab[onclick="switchTab('${type}')"]`).classList.add('active');
            // 切换表单显示
            document.querySelectorAll('.auth-form').forEach(form => form.classList.remove('active'));
            document.getElementById(`${type}Form`).classList.add('active');
        }

        // 检查登录状态
        function checkLoginStatus() {
            const user = localStorage.getItem('helmetUser');
            if (user) {
                // 已登录：隐藏登录框，显示定位界面
                document.getElementById('authBox').style.display = 'none';
                document.getElementById('mapBox').style.display = 'block';
                document.getElementById('logoutBtn').style.display = 'block';
                // 重新初始化地图（确保登录后地图正常）
                initMap();
            } else {
                // 未登录：显示登录框，隐藏定位界面
                document.getElementById('authBox').style.display = 'block';
                document.getElementById('mapBox').style.display = 'none';
                document.getElementById('logoutBtn').style.display = 'none';
            }
        }

        // 注册功能
        function register() {
            const username = document.getElementById('regUsername').value.trim();
            const password = document.getElementById('regPassword').value.trim();
            const confirmPwd = document.getElementById('regConfirmPwd').value.trim();

            // 简单校验
            if (!username || !password) {
                alert('用户名和密码不能为空！');
                return;
            }
            if (password !== confirmPwd) {
                alert('两次输入的密码不一致！');
                return;
            }

            // 存储用户信息（实际项目需对接后端，这里本地存储）
            localStorage.setItem('helmetUser', username);
            localStorage.setItem('helmetPwd', password);
            alert('注册成功！请登录');
            switchTab('login');
        }

        // 登录功能
        function login() {
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value.trim();

            // 简单校验
            if (!username || !password) {
                alert('用户名和密码不能为空！');
                return;
            }

            // 验证用户（实际项目需对接后端，这里本地验证）
            const savedUser = localStorage.getItem('helmetUser');
            const savedPwd = localStorage.getItem('helmetPwd');
            if (savedUser === username && savedPwd === password) {
                alert('登录成功！');
                checkLoginStatus();
            } else {
                alert('用户名或密码错误！');
            }
        }

        // 退出登录
        function logout() {
            localStorage.removeItem('helmetUser');
            localStorage.removeItem('helmetPwd');
            alert('已退出登录！');
            checkLoginStatus();
        }

        // ====================== 定位核心逻辑（保留原有，移除导航） ======================
        // 初始化地图
        function initMap() {
            try {
                map = new AMap.Map('mapContainer', {
                    zoom: 15,
                    center: [116.397470, 39.908823],
                    resizeEnable: true,
                    mapStyle: 'amap://styles/normal'
                });

                AMap.plugin(['AMap.Geolocation', 'AMap.Geocoder'], function() {
                    updateLocationInfo("✅ 地图初始化成功！", "success");
                });

                map.on('error', function(e) {
                    updateLocationInfo("❌ 地图加载失败：" + e.message, "error");
                });
            } catch (e) {
                updateLocationInfo("❌ 地图初始化异常：" + e.message, "error");
                console.error("地图初始化错误：", e);
            }
        }

        // 浏览器原生定位
        function getCurrentLocation() {
            if (!map) {
                updateLocationInfo("❌ 地图未初始化", "error");
                return;
            }

            updateLocationInfo("🔍 正在请求浏览器定位...", "loading");
            if (!navigator.geolocation) {
                updateLocationInfo("❌ 您的浏览器不支持定位功能", "error");
                return;
            }

            navigator.geolocation.getCurrentPosition(
                function(position) {
                    const lng = position.coords.longitude;
                    const lat = position.coords.latitude;
                    currentLocation = [lng, lat];
                    renderMarker(currentLocation, "current");
                    getAddressByLngLat(currentLocation);
                },
                function(error) {
                    let errMsg = "";
                    switch(error.code) {
                        case 1: errMsg = "用户拒绝定位授权"; break;
                        case 2: errMsg = "定位失败，无法获取位置信息"; break;
                        case 3: errMsg = "定位请求超时"; break;
                        default: errMsg = "未知错误：" + error.message;
                    }
                    updateLocationInfo("❌ 浏览器定位失败：" + errMsg, "error");
                },
                {
                    enableHighAccuracy: true,
                    timeout: 10000,
                    maximumAge: 0
                }
            );
        }

        // 模拟硬件GPS定位
        function mockHardwareGPS() {
            if (!map) {
                updateLocationInfo("❌ 地图未初始化", "error");
                return;
            }

            const wgs84LngLat = [116.397470, 39.908823]; 
            updateLocationInfo("📡 正在接收硬件GPS数据...", "loading");

            AMap.convertFrom(wgs84LngLat, 'gps', function(status, result) {
                if (status === 'complete' && result.info === 'ok') {
                    const gcj02LngLat = result.locations[0];
                    currentLocation = [gcj02LngLat.lng, gcj02LngLat.lat];
                    renderMarker(currentLocation, "current");
                    getAddressByLngLat(currentLocation);
                    updateLocationInfo("✅ 硬件GPS定位成功（WGS84→GCJ02转换完成）", "success");
                } else {
                    updateLocationInfo("❌ 坐标系转换失败：" + result.info, "error");
                }
            });
        }

        // 清空地图
        function clearMap() {
            if (marker) {
                marker.remove();
                marker = null;
            }
            currentLocation = null;
            updateLocationInfo("👋 欢迎使用智能头盔定位系统！点击'模拟硬件GPS定位'开始测试", "");
        }

        // 渲染地图标记
        function renderMarker(lngLat, type) {
            if (type === "current" && marker) marker.remove();

            const icon = new AMap.Icon({
                size: new AMap.Size(32, 32),
                image: "https://webapi.amap.com/theme/v1.3/markers/n/mark_b.png"
            });

            const newMarker = new AMap.Marker({
                position: lngLat,
                map: map,
                icon: icon,
                anchor: 'bottom-center'
            });

            marker = newMarker;
            map.setCenter(lngLat);
        }

        // 经纬度转地址
        function getAddressByLngLat(lngLat) {
            const geocoder = new AMap.Geocoder({
                radius: 1000,
                extensions: "all"
            });

            geocoder.getAddress(lngLat, function(status, result) {
                if (status === 'complete' && result.info === 'OK') {
                    const address = result.regeocode.formattedAddress;
                    updateLocationInfo(`📍 当前位置：${address}（经纬度：${lngLat[0].toFixed(6)}, ${lngLat[1].toFixed(6)}）`, "success");
                } else {
                    updateLocationInfo(`📍 经纬度：${lngLat[0].toFixed(6)}, ${lngLat[1].toFixed(6)}（无法解析地址）`, "success");
                }
            });
        }

        // 更新提示信息
        function updateLocationInfo(text, className) {
            const infoBox = document.getElementById("locationInfo");
            infoBox.textContent = text;
            infoBox.className = "location-info";
            if (className) {
                infoBox.classList.add(className);
            }
        }
    </script>
</body>
</html>
