<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>智能头盔导航</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: sans-serif;
    }
    body {
      background: #fff;
    }
    /* 顶部导航栏 */
    .top-bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      padding: 10px 15px;
      background: white;
      display: flex;
      align-items: center;
      gap: 10px;
      z-index: 999;
    }
    /* 搜索框 */
    .search-box {
      flex: 1;
      height: 44px;
      border-radius: 22px;
      background: #f2f2f2;
      display: flex;
      align-items: center;
      padding: 0 15px;
      gap: 8px;
    }
    .search-box input {
      flex: 1;
      border: none;
      outline: none;
      background: transparent;
      font-size: 16px;
    }
    /* 个人中心按钮 */
    .profile-btn {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: rgba(255,255,255,0.95);
      border: none;
      font-size: 20px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.15);
      cursor: pointer;
    }
    /* 地图容器 - 保留给你原来的地图用 */
    #map {
      width: 100%;
      height: 100vh;
      background: #eaeaea;
    }
  </style>
</head>

<body>

  <div class="top-bar">
    <div class="search-box">
      <i>🔍</i>
      <input id="destination" placeholder="输入目的地...">
    </div>
    <!-- 个人中心按钮 -->
    <button class="profile-btn" onclick="goToProfile()">👤</button>
  </div>

  <!-- 地图容器，你原来的地图会渲染在这里 -->
  <div id="map"></div>

  <script>
    // 跳转到个人中心 / 登录页
    function goToProfile() {
      const isLoggedIn = localStorage.getItem('isLoggedIn');
      if (isLoggedIn) {
        window.location.href = 'profile.html';
      } else {
        window.location.href = 'login.html';
      }
    }

    // ———— 你原来的地图JS代码放在下面这里就行 ————
    // 例如：地图初始化、定位、导航等代码
  </script>

</body>
</html>
