<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>个人中心</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    body {
      background: #0f172a;
      color: #e2e8f0;
      padding: 20px;
    }
    .card {
      background: #1e293b;
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.2);
    }
    .title {
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 16px;
      color: #f1f5f9;
    }
    .info-row {
      padding: 12px 0;
      border-bottom: 1px solid #334155;
      font-size: 16px;
      color: #cbd5e1;
    }
    .btn {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: none;
      font-size: 16px;
      margin-top: 10px;
      font-weight: 500;
      cursor: pointer;
    }
    .primary {
      background: #2563eb;
      color: white;
    }
    .danger {
      background: #dc2626;
      color: white;
    }
    .device-info {
      margin-top: 10px;
      padding: 10px;
      background: #334155;
      border-radius: 8px;
      font-size: 14px;
      color: #94a3b8;
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="title">个人信息</div>
    <div class="info-row">用户名：<span id="username">用户</span></div>
    <div class="info-row">登录状态：已登录</div>
  </div>

  <div class="card">
    <div class="title">智能头盔</div>
    <div class="info-row">绑定状态：<span id="deviceStatus">未绑定</span></div>
    <div id="deviceInfo" class="device-info" style="display: none;"></div>
    <button class="btn primary" onclick="bindDevice()">绑定头盔</button>
    <button class="btn danger" onclick="unbindDevice()">解绑头盔</button>
  </div>

  <div class="card">
    <div class="title">健康数据</div>
    <div class="info-row">心率：-- bpm</div>
    <div class="info-row">电量：-- %</div>
    <button class="btn primary" onclick="goToHealth()">查看详细数据</button>
  </div>

  <button class="btn danger" onclick="logout()">退出登录</button>

  <script>
    // 模拟头盔设备信息
    const mockHelmet = {
      deviceId: 'HELMET-STC15F2K60S2-001',
      name: '智能骑行头盔 V1.0',
      mac: '00:11:22:33:44:55',
      firmware: 'v2.1.0'
    };

    window.onload = function () {
      const user = localStorage.getItem('username');
      if (user) {
        document.getElementById('username').innerText = user;
      }
      // 从本地存储恢复绑定状态
      const boundDevice = localStorage.getItem('boundHelmet');
      if (boundDevice) {
        const device = JSON.parse(boundDevice);
        document.getElementById('deviceStatus').innerText = '已绑定';
        document.getElementById('deviceInfo').style.display = 'block';
        document.getElementById('deviceInfo').innerHTML = `
          设备ID：${device.deviceId}<br>
          名称：${device.name}<br>
          MAC：${device.mac}<br>
          固件：${device.firmware}
        `;
      }
    }

    // 绑定头盔
    function bindDevice() {
      const userId = localStorage.getItem('username');
      if (!userId) {
        alert('请先登录');
        return;
      }

      // 模拟扫描头盔过程
      alert('正在扫描附近头盔...');
      setTimeout(() => {
        // 模拟绑定成功
        localStorage.setItem('boundHelmet', JSON.stringify(mockHelmet));
        document.getElementById('deviceStatus').innerText = '已绑定';
        document.getElementById('deviceInfo').style.display = 'block';
        document.getElementById('deviceInfo').innerHTML = `
          设备ID：${mockHelmet.deviceId}<br>
          名称：${mockHelmet.name}<br>
          MAC：${mockHelmet.mac}<br>
          固件：${mockHelmet.firmware}
        `;
        alert('头盔绑定成功！');
      }, 1500);
    }

    // 解绑头盔
    function unbindDevice() {
      if (confirm('确定要解绑头盔吗？')) {
        localStorage.removeItem('boundHelmet');
        document.getElementById('deviceStatus').innerText = '未绑定';
        document.getElementById('deviceInfo').style.display = 'none';
        alert('头盔已解绑');
      }
    }

    function goToHealth() {
      alert('跳转到健康数据页面');
    }

    function logout() {
      localStorage.clear();
      window.location.href = "index.html";
    }
  </script>

</body>
</html>
