<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>支付购买 - 智能头盔</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  body {
    background: #0b1220;
    color: #fff;
    padding: 20px;
  }
  .card {
    background: #131b2d;
    border-radius: 16px;
    padding: 22px;
    margin-bottom: 16px;
  }
  .title {
    font-size: 18px;
    font-weight: bold;
    margin-bottom: 12px;
  }
  .item {
    display: flex;
    justify-content: space-between;
    padding: 10px 0;
    border-bottom: 1px solid #1e2a3f;
    font-size: 15px;
  }
  .price {
    color: #4cc2ff;
    font-weight: bold;
  }
  .total {
    font-size: 18px;
    color: #ffcd3c;
    font-weight: bold;
  }
  .pay-way {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 0;
  }
  .btn {
    width: 100%;
    padding: 16px;
    border-radius: 14px;
    border: none;
    font-size: 16px;
    font-weight: bold;
    margin-top: 10px;
  }
  .btn-pay {
    background: #2563eb;
    color: #fff;
  }
  .btn-back {
    background: #1e2a3f;
    color: #ccc;
  }
</style>
</head>

<body>

<div class="card">
  <div class="title">订单详情</div>
  <div class="item">
    <span>智能定位头盔</span>
    <span class="price">¥ 299</span>
  </div>
  <div class="item">
    <span>心率监测模块</span>
    <span class="price">¥ 69</span>
  </div>
  <div class="item">
    <span>GPS 定位模块</span>
    <span class="price">¥ 99</span>
  </div>
  <div class="item" style="border:none;">
    <span>实付总额</span>
    <span class="total">¥ 467</span>
  </div>
</div>

<div class="card">
  <div class="title">支付方式</div>
  <div class="pay-way">
    <div>🟢</div>
    <span>微信支付（演示）</span>
  </div>
</div>

<button class="btn btn-pay" onclick="toPay()">立即支付 467 元</button>
<button class="btn btn-back" onclick="goBack()">返回个人中心</button>

<script>
  // 支付
  function toPay() {
    if (confirm('确认支付 467 元？\n（本项目为演示，无真实扣款）')) {
      // 模拟支付成功
      alert('✅ 支付成功！\n头盔已激活并自动绑定');
      
      // 支付成功后，自动绑定头盔
      const helmet = {
        deviceId: 'HELMET-DEMO-001',
        name: '智能骑行头盔演示版',
        mac: '00:11:22:33:44:55',
        firmware: 'v1.0'
      };
      localStorage.setItem('boundHelmet', JSON.stringify(helmet));
      
      // 跳回个人中心
      setTimeout(() => {
        window.location.href = 'profile.html';
      }, 1000);
    }
  }

  // 返回
  function goBack() {
    window.location.href = 'profile.html';
  }
</script>

</body>
</html>
