<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>会员充值</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{background:#f5f7fa;padding:20px;padding-bottom:80px;}
        .back{margin-bottom:20px;color:#2563eb;}
        .pay-card{background:#fff;border-radius:16px;padding:25px;margin-bottom:15px;}
        .money{font-size:26px;color:#2563eb;font-weight:bold;margin:12px 0;}
        .pay-btn{width:100%;height:46px;background:#2563eb;color:#fff;border:none;border-radius:8px;margin-top:10px;}

        .mask{
            position:fixed;inset:0;
            background:rgba(0,0,0,0.7);
            display:none;
            align-items:center;justify-content:center;
        }
        .pop-box{
            width:320px;background:#fff;border-radius:16px;
            padding:20px;text-align:center;
        }
        .qrcode{width:200px;height:200px;margin:15px auto;}
        .qrcode img{width:100%;height:100%;border-radius:8px;object-fit:cover;}

        .pop-btn{display:flex;gap:10px;margin-top:20px;}
        .pop-btn button{flex:1;height:40px;border-radius:6px;border:none;}
        .cancel{background:#eee;}
        .confirm{background:#2563eb;color:#fff;}
    </style>
</head>
<body>
    <div class="back" onclick="history.back()">← 返回个人中心</div>
    <h2>会员充值中心</h2>

    <div class="pay-card" onclick="showPay(15,'月度会员',30)">
        <div>⛑️ 月度会员</div>
        <div class="money">¥15.00</div>
        <button class="pay-btn">立即购买</button>
    </div>

    <div class="pay-card" onclick="showPay(98,'年度会员',365)">
        <div>⛑️ 年度会员</div>
        <div class="money">¥98.00</div>
        <button class="pay-btn">立即购买</button>
    </div>

    <div class="mask" id="mask">
        <div class="pop-box">
            <h4>微信扫码支付</h4>
            <div class="qrcode">
                <!-- 已嵌入你的收款码链接 -->
                <img src="https://s2.ax1x.com/2026/04/22/pe2xSu4.png" alt="微信收款码">
            </div>
            <div>金额：<span id="payPrice"></span> 元</div>
            <div class="pop-btn">
                <button class="cancel" onclick="closeMask()">取消</button>
                <button class="confirm" onclick="paySuccess()">我已付款</button>
            </div>
        </div>
    </div>

    <script>
        let payName,payDay;
        function showPay(price,name,day){
            payName = name;
            payDay = day;
            document.getElementById('payPrice').innerText = price;
            document.getElementById('mask').style.display = 'flex';
        }
        function closeMask(){
            document.getElementById('mask').style.display = 'none';
        }
        function paySuccess(){
            closeMask();
            let expire = Date.now() + payDay * 24 * 60 * 60 * 1000;
            localStorage.setItem('vipType', payName);
            localStorage.setItem('vipExpire', expire);
            alert('✅ 充值成功，会员已生效');
        }
        window.onload = function(){
            if(!localStorage.getItem('isLoggedIn')) location.href='login.html';
        }
    </script>
</body>
</html>
