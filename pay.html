<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>会员充值</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;transition:0.3s;}
        body{background:#f5f7fa;padding:20px;padding-bottom:70px;}
        body.dark{background:#111;color:#fff;}
        .pay-card{background:#fff;border-radius:16px;padding:25px;margin-bottom:15px;}
        body.dark .pay-card{background:#222;}
        .money{font-size:24px;color:#2563eb;font-weight:bold;margin:10px 0;}
        .pay-btn{width:100%;height:46px;background:#2563eb;color:#fff;border:none;border-radius:8px;}
        .back{margin-bottom:15px;color:#2563eb;}
    </style>
</head>
<body>
    <div class="back" onclick="history.back()">← 返回</div>

    <div class="pay-card">
        <div>月度会员</div>
        <div class="money">¥15.00</div>
        <button class="pay-btn" onclick="alert('模拟支付成功')">立即支付</button>
    </div>
    <div class="pay-card">
        <div>年度会员</div>
        <div class="money">¥98.00</div>
        <button class="pay-btn" onclick="alert('模拟支付成功')">立即支付</button>
    </div>

    <script>
        window.onload=function(){
            if(!localStorage.getItem('isLoggedIn')) location.href='login.html';
        }
    </script>
</body>
</html>
