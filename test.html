<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>纯定位测试</title>
    <style>
        body { text-align: center; padding: 50px 20px; font-size: 18px; }
        #result { margin-top: 30px; line-height: 1.8; }
        button { padding: 15px 30px; font-size: 18px; }
    </style>
</head>
<body>

<button onclick="getPos()">点我定位</button>
<div id="result"></div>

<script>
function getPos() {
    const r = document.getElementById('result');
    r.innerHTML = "正在定位...";

    // 这是手机系统原生定位，谁都拦不住
    navigator.geolocation.getCurrentPosition(
        (pos) => {
            r.innerHTML = 
                "✅ 定位成功！<br>" +
                "纬度：" + pos.coords.latitude + "<br>" +
                "经度：" + pos.coords.longitude;
        },
        (err) => {
            r.innerHTML = 
                "❌ 定位失败<br>" +
                "错误代码：" + err.code + "<br>" +
                "信息：" + err.message;
        }
    );
}
</script>
</body>
</html>
